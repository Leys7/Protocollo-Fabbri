<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOLLO FABBRI | Home</title>
    <style>
        :root {
            --glow-green: #20C20E;
            --dark-bg: #0a0a0b;
            --border-color: #333;
        }
        body {
            background-color: var(--dark-bg);
            color: #ccc;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        #terminal-home {
            width: 100%;
            max-width: 850px;
            background: #111;
            border: 1px solid var(--border-color);
            border-top: 25px solid #222;
            border-radius: 5px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        .status-bar { font-size: 0.8rem; color: #666; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; text-transform: uppercase; }
        h1 { color: var(--glow-green); font-size: 2rem; text-transform: uppercase; letter-spacing: 4px; margin: 0 0 20px 0; }
        .terminal-container { width: 100%; color: var(--glow-green); min-height: 120px; margin-bottom: 30px; }
        .line { font-size: 1.2rem; line-height: 1.5; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background-color: var(--glow-green); margin-left: 5px; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .intro-text { line-height: 1.6; margin-bottom: 30px; color: #aaa; font-size: 0.95rem; }
        .warning-box { border: 1px dashed #ff1744; padding: 15px; color: #ff1744; background: rgba(255, 23, 68, 0.05); font-size: 0.85rem; margin-bottom: 30px; }
        .btn-start { display: inline-block; background: transparent; color: var(--glow-green); border: 2px solid var(--glow-green); padding: 15px 40px; font-weight: bold; text-decoration: none; text-transform: uppercase; transition: 0.3s; cursor: pointer; }
        .btn-start:hover { background: var(--glow-green); color: #000; box-shadow: 0 0 20px var(--glow-green); }
    </style>
</head>
<body>

<div id="terminal-home">
    <div class="status-bar">SISTEMA: ONLINE | SESSIONE: INVESTIGATORE_LIVE</div>
    <h1>Protocollo Fabbri</h1>
    <div class="terminal-container">
        <span class="line" id="text-box"></span><span class="cursor"></span>
    </div>
    <div class="intro-text">
        <p>> <strong>FILE_ID:</strong> CASE_CNOS_992</p>
        <p>> <strong>SITUAZIONE:</strong> Analisi forense necessaria per sospetto attacco phishing.</p>
    </div>
    <div class="warning-box">⚠️ ACCESSO RISERVATO AI SOLI AGENTI AUTORIZZATI.</div>
    <div style="text-align: center;">
        <a href="pagina2.html" class="btn-start">Inizia Investigazione</a>
    </div>
</div>

<script>
    const frase = "Il pensiero di una persona può cambiare leggendo informazioni su internet. La natura del cambiamento solitamente è racchiusa dal passare a non avere un’opinione ad averne una sbagliata.";
    const display = document.getElementById('text-box');
    let index = 0;
    function typeWriter() {
        if (index < frase.length) {
            display.innerHTML += frase.charAt(index);
            index++;
            setTimeout(typeWriter, 30);
        }
    }
    window.onload = typeWriter;
</script>

</body>
</html>

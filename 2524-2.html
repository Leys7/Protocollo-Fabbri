<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisi Forense - Security Lab</title>
    <style>
        /* Variabili Globali per facile manutenzione */
        :root {
            --neon-cyan: #00e5ff;
            --neon-red: #ff1744;
            --neon-green: #00ff41;
            --bg-dark: #0a0a0a;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background: var(--bg-dark); 
            font-family: 'Courier New', Courier, monospace; 
            color: var(--neon-cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #wrapper {
            position: relative;
            width: 95%;
            max-width: 900px;
            margin: 20px auto;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            line-height: 0; /* Rimuove spazi vuoti sotto l'immagine */
        }

        #scena-img {
            width: 100%;
            height: auto;
            display: block;
            cursor: crosshair;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Classe per i click dell'utente */
        .punto {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 229, 255, 0.4);
            pointer-events: none;
            z-index: 10;
        }

        /* --- MODALITÀ DEBUG: VISUALIZZAZIONE ZONE --- */
        .debug-zone {
            position: absolute;
            border: 1px dashed white;
            background: rgba(255, 255, 255, 0.2);
            pointer-events: none; /* Non deve interferire con i click */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            z-index: 5;
        }

        .interfaccia {
            width: 95%;
            max-width: 900px;
            background: #111;
            padding: 20px;
            text-align: center;
            border: 1px solid #333;
            box-sizing: border-box;
        }

        .controls { margin-bottom: 15px; }

        button {
            padding: 12px 24px;
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        button:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }

        #feedback { margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="wrapper">
    <img id="scena-img" src="https://leys7.github.io/Protocollo-Fabbri/peek.png" alt="Scena del crimine" onmousedown="registraClic(event)">
    <div id="debug-layer"></div>
</div>

<div class="interfaccia">
    <div class="controls">
        <button id="btn-analizza" onclick="valuta()">Avvia Scansione</button>
        <button id="btn-reset" onclick="resetScansione()">Reset</button>
        <button id="btn-debug" onclick="toggleDebug()" style="border-color: yellow; color: yellow;">Toggle Debug</button>
    </div>
    <p id="feedback">Analizza l'immagine e individua le falle di sicurezza.</p>
</div>

<script>
    let clicEffettuati = [];
    const feedback = document.getElementById('feedback');
    const img = document.getElementById('scena-img');
    const debugLayer = document.getElementById('debug-layer');

    // Mappatura zone: t=top, l=left, w=width, h=height (tutto in %)
    const zoneTarget = [
        {t:25, l:4, w:10, h:9}, {t:65, l:2, w:18, h:32},
        {t:67, l:18, w:7, h:14}, {t:80, l:21, w:23, h:19},
        {t:62, l:66, w:12, h:20}, {t:44, l:81, w:14, h:22},
        {t:17, l:44, w:15, h:24}, {t:6, l:48, w:7, h:10}
    ];

    // Funzione per visualizzare le zone (per il "cucito" tecnico)
    function renderDebugZones() {
        debugLayer.innerHTML = '';
        zoneTarget.forEach((z, i) => {
            const area = document.createElement('div');
            area.className = 'debug-zone';
            area.style.top = z.t + '%';
            area.style.left = z.l + '%';
            area.style.width = z.w + '%';
            area.style.height = z.h + '%';
            area.innerText = i;
            debugLayer.appendChild(area);
        });
    }

    function toggleDebug() {
        const isVisible = debugLayer.style.display === 'block';
        debugLayer.style.display = isVisible ? 'none' : 'block';
        if (!isVisible) renderDebugZones();
    }

    function registraClic(e) {
        const rect = img.getBoundingClientRect();
        // Calcolo preciso in percentuale rispetto all'immagine caricata
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        const dot = document.createElement('div');
        dot.className = 'punto';
        dot.style.left = x + '%';
        dot.style.top = y + '%';
        document.getElementById('wrapper').appendChild(dot);

        clicEffettuati.push({x: x, y: y});
        feedback.innerText = `Tracce rilevate: ${clicEffettuati.length}`;
    }

    function valuta() {
        let centri = new Set();
        let errori = 0;

        clicEffettuati.forEach(c => {
            let colpito = false;
            zoneTarget.forEach((z, i) => {
                if(c.x >= z.l && c.x <= (z.l + z.w) && c.y >= z.t && c.y <= (z.t + z.h)) {
                    centri.add(i);
                    colpito = true;
                }
            });
            if (!colpito) errori++;
        });

        document.getElementById('btn-analizza').disabled = true;
        const punteggioNetto = centri.size - errori;

        if(punteggioNetto >= 7) {
            feedback.innerHTML = `<span style="color:var(--neon-green)">ANALISI COMPLETATA. Punteggio: ${punteggioNetto}.</span><br>CODICE DOSSIER 002: <b>TRACCIA-00</b>`;
        } else {
            feedback.innerHTML = `<span style="color:var(--neon-red)">FALLITO. Punteggio: ${punteggioNetto}.</span><br>Rilevazioni insufficienti o errate.`;
        }
    }

    function resetScansione() {
        clicEffettuati = [];
        document.querySelectorAll('.punto').forEach(p => p.remove());
        document.getElementById('btn-analizza').disabled = false;
        feedback.innerText = "Analisi resettata. Individua le falle.";
        feedback.style.color = "var(--neon-cyan)";
    }
</script>

</body>
</html>
